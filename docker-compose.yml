services:

  backend:
    build:
      context: ./backend

    container_name: news-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: news-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: unless-stopped
