version: '3.8'

services:
  backend:
    build: ./backend
    container_name: newsportal-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - GNEWS_API_KEY=${GNEWS_API_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      # GEMINI_API_KEY and NEWSDATA_API_KEY not required while AI features are disabled
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
    networks:
      - newsnet

  frontend:
    build: ./frontend
    container_name: newsportal-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - newsnet

networks:
  newsnet:
    driver: bridge
